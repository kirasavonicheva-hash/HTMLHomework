<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка профиля</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <!-- Верхняя обложка -->
    <div class="card-cover"></div>

    <!-- Аватар -->
    <div class="card-avatar">
      <img src="мяу.jpg" alt="Аватар">
    </div>

    <!-- Основная информация -->
    <div class="card-info">
      <h2 class="card-name">Кира Савоничева</h2>
      <p class="card-role">Ну тип - Frontend-разработчик</p>
      <p class="card-bio">
        Тут написано что-то интересное.
        Вы все падаете в обморок от увиденного описание.
      </p>
    </div>

    <!-- Статистика -->
    <div class="card-stats">
      <div class="stat">
        <span class="stat-number">1М</span>
        <span class="stat-label">проекта</span>
      </div>
      <div class="stat">
        <span class="stat-number">1М</span>
        <span class="stat-label">подписчиков</span>
      </div>
      <div class="stat">
        <span class="stat-number">1М</span>
        <span class="stat-label">отзывов</span>
      </div>
    </div>

    <!-- Кнопки -->
    <div class="card-actions">
      <button class="btn btn-primary">Подписаться</button>
      <button class="btn btn-secondary">Написать</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
