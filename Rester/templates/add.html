<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить наблюдение - Реестр аномальных облаков</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Добавить новое наблюдение</h1>
        </header>
        <div class="form-container">
            {% if errors %}
            <div class="error-messages">
                <h4>Пожалуйста, исправьте следующие ошибки:</h4>
                <ul>
                    {% for error in errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
            <form method="POST" action="/add" class="observation-form">
                <div class="form-group">
                    <label for="observer_name">Имя наблюдателя</label>
                    <input type="text" id="observer_name" name="observer_name" 
                           value="{{ form_data.get('observer_name', '') }}"
                           placeholder="Введите ваше имя" required>
                </div>
                <div class="form-group">
                    <label for="location">Место наблюдения</label>
                    <input type="text" id="location" name="location" 
                           value="{{ form_data.get('location', '') }}"
                           placeholder="Город, район, координаты" required>
                </div>
                <div class="form-group">
                    <label for="date">Дата</label>
                    <input type="date" id="date" name="date" 
                           value="{{ form_data.get('date', '') }}" required>
                </div>
                <div class="form-group">
                    <label for="time">Время</label>
                    <input type="time" id="time" name="time" 
                           value="{{ form_data.get('time', '') }}" required>
                </div>
                <div class="form-group">
                    <label for="cloud_type">Тип облака</label>
                    <select id="cloud_type" name="cloud_type" required>
                        <option value="">Выберите тип облака</option>
                        {% for c_type_code, c_type_name in cloud_types %}
                        <option value="{{ c_type_code }}" 
                                {% if form_data.get('cloud_type') == c_type_code %}selected{% endif %}>
                            {{ c_type_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Описание</label>
                    <textarea id="description" name="description" rows="4"
                              placeholder="Опишите, что вы видели...">{{ form_data.get('description', '') }}</textarea>
                </div>
                <div class="form-group">
                    <label for="photo_url">Ссылка на фото (опционально)</label>
                    <input type="url" id="photo_url" name="photo_url" 
                           value="{{ form_data.get('photo_url', '') }}"
                           placeholder="https://...">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Сохранить наблюдение</button>
                    <a href="/" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
