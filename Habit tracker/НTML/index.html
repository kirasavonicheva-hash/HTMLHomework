<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лунное сияние — Трекер привычек</title>
    <style>
        /* ГЛОБАЛЬНЫЕ СТИЛИ И СБРОС */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Удобная модель бокса — padding и border не увеличивают ширину */
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            position: relative; /* для позиционирования псевдоэлементов и канваса */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* Фоновый слой №1 — глубокий градиент (космос) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3; /* самый нижний слой */
            background: linear-gradient(145deg, #0b0719 0%, #1a1030 50%, #0c0922 100%);
        }

        /* Фоновый слой №2 — радиальное сияние (магический розовый свет) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, rgba(255, 30, 150, 0.25) 0%, rgba(0, 0, 0, 0.4) 80%);
            pointer-events: none; /* чтобы не мешать кликам по кнопкам */
            box-shadow: inset 0 0 100px rgba(255, 0, 120, 0.3);
        }

        /* Холст для падающих комет / звёзд */
        #cometsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* между фоном и контентом */
            pointer-events: none;
            opacity: 0.55;
            filter: blur(1px); /* лёгкое размытие для атмосферы */
        }

        /* Основная карточка-обёртка со стеклянным эффектом (glassmorphism) */
        .wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            background: rgba(20, 12, 35, 0.45);
            backdrop-filter: blur(24px) saturate(200%); /* размытие заднего фона */
            border-radius: 3rem;
            padding: 2rem 2.5rem 3.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 70, 180, 0.4), inset 0 0 35px rgba(255, 30, 150, 0.3);
            border: 1px solid rgba(255, 90, 190, 0.5);
        }

        /* Верхняя панель с заголовком, котом и глобальным стрейком */
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 1rem;
            background: rgba(45, 25, 70, 0.5);
            padding: 0.8rem 2rem;
            border-radius: 80px;
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 100, 200, 0.45);
        }

        /* Заголовок с градиентным текстом */
        .title-area h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #ff66c0, #f0a6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(255, 30, 150, 0.4);
        }

        /* Блок кота и глобального счётчика (расположен со смещением) */
        .cat-streak-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-left: -1.7cm; /* визуальный сдвиг влево */
        }

        /* Контейнер для SVG-кота */
        .custom-cat {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        /* Базовый стиль SVG-кота */
        .cat-svg {
            width: 100px;
            height: 100px;
            transition: transform 0.3s ease, filter 0.2s;
        }

        /* Активное состояние кота (есть глобальный стрейк > 0) — свечение и пульсация */
        .cat-svg.active-cat {
            filter: drop-shadow(0 0 16px #ff66d0);
            animation: catGlowPulse 1.2s infinite ease-in-out;
        }

        /* Неактивное состояние (стрейк = 0) — приглушённый, серый */
        .cat-svg.inactive-cat {
            filter: grayscale(0.6) drop-shadow(0 0 4px #b370a0);
            opacity: 0.7;
        }

        /* Анимация пульсации кота */
        @keyframes catGlowPulse {
            0% { filter: drop-shadow(0 0 6px #ff66c0); transform: scale(1); }
            50% { filter: drop-shadow(0 0 22px #ff44aa); transform: scale(1.04); }
            100% { filter: drop-shadow(0 0 6px #ff66c0); transform: scale(1); }
        }

        /* Глобальный счётчик непрерывных дней (все привычки вместе) */
        .global-streak {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffeef8;
            text-shadow: 0 0 6px #ff66c0;
            text-align: center;
        }

        /* Подзаголовок с поэтичным описанием */
        .sub {
            text-align: center;
            color: #f0d6ff;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Блок добавления новой привычки (инпут + кнопка) */
        .add-habit {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: rgba(20, 8, 40, 0.55);
            padding: 1.3rem 1.8rem;
            border-radius: 3rem;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 70, 180, 0.5);
        }

        /* Поле ввода с неоновой окантовкой */
        .add-habit input {
            flex: 2;
            background: rgba(255, 220, 250, 0.2);
            border: 1px solid #ff77cc;
            padding: 12px 20px;
            border-radius: 60px;
            color: #ffffff;
            outline: none;
        }

        /* Неоновая кнопка */
        .neon-btn {
            background: rgba(255, 60, 160, 0.25);
            border: 2px solid #ff6ac4;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: bold;
            color: #ffddf5;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 12px #ff44aa;
        }

        /* Сетка двух колонок: вредные / полезные привычки */
        .habits-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 1rem;
        }

        /* Стиль колонки */
        .habit-column {
            background: rgba(25, 12, 48, 0.55);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 70, 180, 0.5);
            backdrop-filter: blur(20px);
        }

        /* Заголовок колонки */
        .column-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ff9ee0;
            text-align: center;
        }

        /* Список привычек (скролл, если много) */
        .habits-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        /* Карточка одной привычки */
        .habit-card {
            background: rgba(45, 25, 75, 0.6);
            border-radius: 2.2rem;
            padding: 1rem 1.3rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            border: 1px solid rgba(255, 120, 200, 0.5);
        }

        /* Бейдж с количеством дней подряд */
        .streak-badge {
            background: rgba(255, 80, 160, 0.35);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffebf5;
        }

        /* Кнопки "Отметить" и "Удалить" */
        .check-btn, .delete-btn {
            background: rgba(230, 150, 200, 0.3);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid rgba(255, 100, 160, 0.6);
        }

        /* Статистика внизу (всего привычек, суммарный стрейк и т.д.) */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(24px);
            border-radius: 2.5rem;
            padding: 0.9rem 2rem;
            flex-wrap: wrap;
            color: #f0ccff;
            border: 1px solid rgba(255, 110, 190, 0.7);
        }

        /* Адаптив для мобильных устройств */
        @media (max-width: 900px) {
            .habits-section {
                grid-template-columns: 1fr; /* на телефонах — одна колонка */
            }
            .habit-card {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* Анимация тряски при ошибке ввода */
        .error-shake {
            animation: shakeNeon 0.3s ease-in-out 0s 2;
        }

        @keyframes shakeNeon {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }

        /* Анимация "поп" при увеличении глобального стрейка */
        .streak-pop {
            animation: streakPop 0.4s ease-out;
        }

        @keyframes streakPop {
            50% { transform: scale(1.2); color: #ffd700; text-shadow: 0 0 12px #ff66c0; }
        }
    </style>
</head>
<body>
<canvas id="cometsCanvas"></canvas> <!-- Здесь будут рисоваться падающие кометы -->
<div class="wrapper">
    <!-- Шапка: заголовок + кот + глобальный streak -->
    <div class="header-stats">
        <div class="title-area">
            <h1>🌙 Лунное сияние <span>трекер привычек</span></h1>
        </div>
        <!-- Панель кота и глобального счётчика (общий непрерывный день по всем привычкам) -->
        <div class="cat-streak-panel" id="catPanel">
            <div class="custom-cat" id="catIconContainer">
                <!-- SVG-кот: тело, лапы, уши, глаза, усы, хвост и звёздочки вокруг -->
                <svg class="cat-svg" id="catSvgElem" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Лапы нижние, тело, уши, глаза, блики, радужка, нос, рот, усы, румянец, звёздочки, хвост -->
                    <!-- Все координаты подобраны так, чтобы кот выглядел милым и лунным -->
                </svg>
            </div>
            <div class="global-streak" id="globalStreakDisplay">0</div>
        </div>
    </div>
    <div class="sub">Каждый день новая строчка в дневнике сияния</div>

    <!-- Форма добавления привычки -->
    <div class="add-habit">
        <input type="text" id="habitNameInput" placeholder="Например: Медитация, Зарядка, Чтение...">
        <button class="neon-btn" id="addHabitBtn">Добавить привычку</button>
    </div>

    <!-- Две колонки для привычек (вредные / полезные) -->
    <div id="habitsContainer" class="habits-section">
        <div class="habit-column">
            <div class="column-title">Вредные привычки</div>
            <div class="habits-grid" id="badHabits"></div>
        </div>
        <div class="habit-column">
            <div class="column-title">Полезные привычки</div>
            <div class="habits-grid" id="goodHabits"></div>
        </div>
    </div>

    <!-- Нижняя статистика -->
    <div class="stats">
        <p>Всего привычек: <span id="totalHabits">0</span></p>
        <p>Суммарный streak: <span id="totalStreak">0</span></p>
        <p>Макс. цепочка: <span id="maxStreak">0</span></p>
        <p>Выполнено сегодня: <span id="todayCompleted">0</span></p>
    </div>
</div>

<script>
    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И КЛЮЧ ХРАНЕНИЯ ----------
    const STORAGE_KEY = "comet_habits_lunar_dream_cat_final_v2"; // ключ для localStorage
    let habits = []; // массив объектов привычек

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ ДАТ ----------
    // Возвращает сегодняшнюю дату в формате YYYY-MM-DD
    function getTodayDate() {
        const d = new Date();
        return d.toISOString().slice(0, 10);
    }

    // Возвращает вчерашнюю дату
    function getYesterdayStr() {
        const y = new Date();
        y.setDate(y.getDate() - 1);
        return y.toISOString().slice(0, 10);
    }

    // ---------- ЗАГРУЗКА / СОХРАНЕНИЕ ДАННЫХ В localStorage ----------
    // Загружает привычки из хранилища, подстраховываясь от повреждённых данных
    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                habits = JSON.parse(raw);
                if (!Array.isArray(habits)) habits = [];
            } catch (e) { habits = []; }
        } else {
            habits = [];
        }
        // Нормализация: у каждой привычки должны быть поля currentStreak, lastCheckDate, createdAt
        habits = habits.map(h => ({
            id: h.id,
            name: h.name,
            currentStreak: h.currentStreak ?? 0,
            lastCheckDate: h.lastCheckDate ?? null,
            createdAt: h.createdAt ?? new Date().toISOString()
        }));
    }

    // Сохраняет текущий массив привычек в localStorage
    function saveToDB() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
    }

    // ---------- ЛОГИКА ПЕРЕСЧЁТА СТРЕЙКОВ (ОБНУЛЕНИЕ ПРИ ПРОПУСКЕ ДНЯ) ----------
    // Проходит по всем привычкам. Если последняя отметка была не сегодня и не вчера — сбрасываем streak в 0.
    function recalcAllStreaks() {
        const today = getTodayDate();
        const yesterday = getYesterdayStr();
        let changed = false;
        for (let h of habits) {
            if (!h.lastCheckDate) {
                if (h.currentStreak !== 0) { h.currentStreak = 0; changed = true; }
                continue;
            }
            const last = h.lastCheckDate;
            if (last !== today && last !== yesterday && h.currentStreak !== 0) {
                h.currentStreak = 0;
                changed = true;
            }
        }
        if (changed) saveToDB();
    }

    // Вычисляет новый streak для привычки, если её отметить сегодня.
    // Правила: если уже отмечена сегодня -> без изменений.
    // Если отметка вчера -> currentStreak+1. Иначе (пропуск) -> 1.
    function computeNewStreak(habit) {
        const today = getTodayDate();
        if (habit.lastCheckDate === today) return habit.currentStreak;
        if (!habit.lastCheckDate) return 1;
        const yesterday = getYesterdayStr();
        if (habit.lastCheckDate === yesterday) return habit.currentStreak + 1;
        return 1;
    }

    // ---------- ГЛОБАЛЬНЫЙ STREAK (ОБЩАЯ ЦЕПОЧКА ДНЕЙ, КОГДА ХОТЬ ОДНА ПРИВЫЧКА БЫЛА ОТМЕЧЕНА) ----------
    // Идея: собираем все даты, когда была отмечена хоть одна привычка, ищем самую длинную непрерывную последовательность.
    function computeGlobalStreak() {
        if (habits.length === 0) return 0;
        let allDates = [];
        for (let h of habits) {
            if (h.lastCheckDate) allDates.push(h.lastCheckDate);
        }
        if (allDates.length === 0) return 0;
        let uniqueDates = [...new Set(allDates)].sort().reverse(); // уникальные даты от новых к старым
        const today = getTodayDate();
        const yesterday = getYesterdayStr();
        const hasToday = uniqueDates.includes(today);
        const hasYesterday = uniqueDates.includes(yesterday);
        if (!hasToday && !hasYesterday) return 0;
        let startDate = hasToday ? today : yesterday;
        let streak = 1;
        let checkDate = new Date(startDate);
        for (let i = 1; i < 365; i++) {
            checkDate.setDate(checkDate.getDate() - 1);
            const dateStr = checkDate.toISOString().slice(0, 10);
            if (uniqueDates.includes(dateStr)) {
                streak++;
            } else {
                break;
            }
        }
        return streak;
    }

    // Обновляет кота и глобальный счётчик. Если globalStreak > 0 — кот светится и пульсирует.
    function updateCatAndGlobalUI(animate = false) {
        const globalStreak = computeGlobalStreak();
        const streakDiv = document.getElementById("globalStreakDisplay");
        if (streakDiv) {
            if (animate) {
                streakDiv.classList.add('streak-pop');
                setTimeout(() => streakDiv.classList.remove('streak-pop'), 400);
            }
            streakDiv.innerText = globalStreak;
        }
        const catSvg = document.getElementById("catSvgElem");
        if (catSvg) {
            if (globalStreak > 0) {
                catSvg.classList.remove("inactive-cat");
                catSvg.classList.add("active-cat");
            } else {
                catSvg.classList.remove("active-cat");
                catSvg.classList.add("inactive-cat");
            }
        }
    }

    // ---------- ОТРИСОВКА СПИСКА ПРИВЫЧЕК ПО КОЛОНКАМ ----------
    // Разделяет привычки на "вредные" и "полезные" по ключевым словам.
    // Генерирует HTML и вешает обработчики на кнопки "Отметить" и "Удалить".
    function renderHabitsOnly() {
        const badContainer = document.getElementById('badHabits');
        const goodContainer = document.getElementById('goodHabits');
        if (!badContainer || !goodContainer) return;

        const today = getTodayDate();
        // Списки ключевых слов для категоризации (можно расширять)
        const badWords = ['курение', 'алкоголь', 'сладкое', 'фастфуд', 'сигареты', 'чипсы', 'газировка', 'никотин', 'энергетик', 'токсикомания', 'переедание', 'кофеин', 'игромания', 'лудомания'];
        const goodWords = ['спорт', 'зарядка', 'медитация', 'чтение', 'вода', 'бег', 'йога', 'тренировка', 'отжимания', 'книга', 'учеба', 'обследование', 'сон'];

        let badHtml = '', goodHtml = '';
        for (let habit of habits) {
            const isCheckedToday = (habit.lastCheckDate === today);
            const btnText = isCheckedToday ? 'Выполнено' : 'Отметить';
            const habitHtml = `
                <div class="habit-card" data-id="${habit.id}">
                    <div class="habit-info" style="display:flex; flex-wrap:wrap; align-items:center; gap:8px; flex:3;">
                        <div class="habit-name">${escapeHtml(habit.name)}</div>
                        <div class="streak-badge">${habit.currentStreak} дн.</div>
                        <div class="last-updated">${habit.lastCheckDate || '—'}</div>
                    </div>
                    <div class="actions">
                        <button class="check-btn check-btn-item" data-id="${habit.id}" ${isCheckedToday ? 'disabled style="opacity:0.6; cursor:not-allowed;"' : ''}>${btnText}</button>
                        <button class="delete-btn delete-btn-item" data-id="${habit.id}">Удалить</button>
                    </div>
                </div>
            `;
            const nameLower = habit.name.toLowerCase();
            if (badWords.some(w => nameLower.includes(w))) {
                badHtml += habitHtml;
            } else if (goodWords.some(w => nameLower.includes(w))) {
                goodHtml += habitHtml;
            } else {
                goodHtml += habitHtml; // всё остальное по умолчанию в полезные
            }
        }

        badContainer.innerHTML = badHtml || '<div class="empty-message">Здесь пока пусто</div>';
        goodContainer.innerHTML = goodHtml || '<div class="empty-message">Полезные привычки ждут вас</div>';

        // Динамическое назначение обработчиков для кнопок "Отметить"
        document.querySelectorAll('.check-btn-item:not([disabled])').forEach(btn => {
            btn.removeEventListener('click', btn._checkHandler);
            const handler = (e) => {
                const id = btn.getAttribute('data-id');
                if (id) markHabitDone(id);
                e.stopPropagation();
            };
            btn.addEventListener('click', handler);
            btn._checkHandler = handler;
        });

        // Обработчики для кнопок "Удалить"
        document.querySelectorAll('.delete-btn-item').forEach(btn => {
            btn.removeEventListener('click', btn._delHandler);
            const delHandler = (e) => {
                const id = btn.getAttribute('data-id');
                if (id) deleteHabit(id);
                e.stopPropagation();
            };
            btn.addEventListener('click', delHandler);
            btn._delHandler = delHandler;
        });

        updateStatsPanel(); // пересчитать статистику после изменения
    }

    // ---------- ОТМЕТИТЬ ПРИВЫЧКУ ВЫПОЛНЕННОЙ ----------
    function markHabitDone(habitId) {
        const habit = habits.find(h => h.id === habitId);
        if (!habit) return;
        const today = getTodayDate();
        if (habit.lastCheckDate === today) {
            showToast("Сегодня уже отмечено! Жди завтра", "#ff99cc");
            return;
        }
        const newStreak = computeNewStreak(habit);
        habit.currentStreak = newStreak;
        habit.lastCheckDate = today;
        saveToDB();
        renderHabitsOnly();     // обновляем UI
        updateCatAndGlobalUI(true); // анимируем глобальный счётчик
        showToast(`${habit.name} отмечено! Цепочка: ${newStreak} дн.`, "#c8a2ff");
    }

    // ---------- УДАЛИТЬ ПРИВЫЧКУ ----------
    function deleteHabit(habitId) {
        habits = habits.filter(h => h.id !== habitId);
        saveToDB();
        renderHabitsOnly();
        updateCatAndGlobalUI();
        showToast("Привычка удалена, продолжайте сиять!", "#ffb3d1");
    }

    // ---------- ДОБАВИТЬ НОВУЮ ПРИВЫЧКУ ----------
    function addNewHabit(name) {
        const trimmed = name.trim();
        if (trimmed === "") {
            showToast("Введите название привычки!", "#ffa0d0");
            return false;
        }
        if (habits.some(h => h.name.toLowerCase() === trimmed.toLowerCase())) {
            showToast("Такая привычка уже есть!", "#ffb5b5");
            return false;
        }
        const newHabit = {
            id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random().toString(36),
            name: trimmed,
            currentStreak: 0,
            lastCheckDate: null,
            createdAt: new Date().toISOString()
        };
        habits.unshift(newHabit); // новые привычки в начало списка
        saveToDB();
        renderHabitsOnly();
        updateCatAndGlobalUI();
        showToast(`"${trimmed}" добавлена! Время сиять`, "#dbbaff");
        return true;
    }

    // ---------- ОБНОВЛЕНИЕ НИЖНЕЙ СТАТИСТИКИ ----------
    function updateStatsPanel() {
        const total = habits.length;
        let sumStreak = 0;
        let maxStreakVal = 0;
        let todayDone = 0;
        const today = getTodayDate();
        for (let h of habits) {
            sumStreak += h.currentStreak;
            if (h.currentStreak > maxStreakVal) maxStreakVal = h.currentStreak;
            if (h.lastCheckDate === today) todayDone++;
        }
        document.getElementById('totalHabits').innerText = total;
        document.getElementById('totalStreak').innerText = sumStreak;
        document.getElementById('maxStreak').innerText = maxStreakVal;
        document.getElementById('todayCompleted').innerText = todayDone;
    }

    // ---------- ЗАЩИТА ОТ XSS (экранирование HTML) ----------
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- ПОЛНАЯ ПЕРВИЧНАЯ ОТРИСОВКА (ЗАГРУЗКА + РЕКАЛЬКУЛЯЦИЯ) ----------
    function renderAll() {
        loadData();
        recalcAllStreaks();    // сбросить стрейки у пропустивших дни
        saveToDB();            // сохранить изменения (если были сбросы)
        renderHabitsOnly();
        updateCatAndGlobalUI();
    }

    // ---------- НЕОНОВЫЙ TOAST-УВЕДОМЛЕНИЕ ----------
    function showToast(msg, colorHint) {
        let toast = document.getElementById('dynamicToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'dynamicToast';
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#221c3ae6';
            toast.style.backdropFilter = 'blur(24px)';
            toast.style.padding = '12px 32px';
            toast.style.borderRadius = '60px';
            toast.style.fontWeight = 'bold';
            toast.style.color = '#ffecfd';
            toast.style.zIndex = '9999';
            toast.style.border = '1px solid #ff80cc';
            toast.style.boxShadow = '0 0 18px #ff44aa';
            document.body.appendChild(toast);
        }
        toast.innerText = msg;
        toast.style.opacity = '1';
        if (window.toastTimeout) clearTimeout(window.toastTimeout);
        window.toastTimeout = setTimeout(() => { toast.style.opacity = '0'; }, 2200);
    }

    // ---------- АНИМАЦИЯ КОМЕТ НА CANVAS ----------
    const canvas = document.getElementById('cometsCanvas');
    const ctx = canvas.getContext('2d');
    let comets = [];
    const COMET_COUNT = 18;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // Класс "Мягкая комета" — падающая светящаяся линия с хвостом
    class SoftComet {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * -500 - 100; // старт за пределами экрана сверху
            this.size = Math.random() * 1.8 + 0.8;
            this.speedY = Math.random() * 0.95 + 0.4; // скорость падения
            this.speedX = (Math.random() - 0.5) * 0.3; // лёгкий сдвиг по горизонтали
            this.opacity = Math.random() * 0.45 + 0.2;
            this.hue = 310 + Math.random() * 40; // оттенок в розово-фиолетовой гамме
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;
            if (this.y > canvas.height + 200) this.reset();
        }
        draw() {
            // Хвост — градиент от яркой головы к прозрачному
            const tailX = this.x - this.speedX * 50;
            const tailY = this.y - this.speedY * 50;
            const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
            grad.addColorStop(0, `hsla(${this.hue}, 75%, 68%, ${this.opacity * 0.8})`);
            grad.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0)`);
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(tailX, tailY);
            ctx.strokeStyle = grad;
            ctx.lineWidth = this.size * 0.6;
            ctx.stroke();
            // Голова кометы — небольшая светящаяся точка
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${this.opacity})`;
            ctx.fill();
        }
    }

    function initComets() {
        comets = [];
        for (let i = 0; i < COMET_COUNT; i++) comets.push(new SoftComet());
    }

    function animateComets() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'lighter'; // эффект свечения
        comets.forEach(c => { c.update(); c.draw(); });
        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(animateComets);
    }

    resizeCanvas();
    initComets();
    animateComets();
    window.addEventListener('resize', () => { resizeCanvas(); initComets(); });
    canvas.style.opacity = '0.65';
    canvas.style.filter = 'blur(1.8px)';

    // ---------- ИНИЦИАЛИЗАЦИЯ ВСЕГО ПРИЛОЖЕНИЯ ----------
    function init() {
        renderAll(); // загрузить данные и отрисовать привычки
        const addBtn = document.getElementById('addHabitBtn');
        const inputField = document.getElementById('habitNameInput');
        if (addBtn) {
            addBtn.addEventListener('click', () => {
                const val = inputField.value;
                if (addNewHabit(val)) {
                    inputField.value = '';
                    inputField.focus();
                } else {
                    inputField.classList.add('error-shake');
                    setTimeout(() => inputField.classList.remove('error-shake'), 400);
                }
            });
        }
        if (inputField) {
            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addBtn.click();
            });
        }
    }
    init(); // запуск при загрузке страницы
</script>
